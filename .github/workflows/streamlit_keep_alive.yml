name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch: 

env:
  # This removes the Node.js warning and opts into the newer runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wake_and_push:
    runs-on: ubuntu-latest
    permissions:
      # Explicitly giving the bot permission to write to the repo
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the push isn't "shallow"

      - name: Access App with Browser Spoofing
        run: |
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          https://digital-resume-mahesh.streamlit.app/

      - name: Update Heartbeat
        run: |
          echo "Last Maintenance: $(date)" > heartbeat.txt
          echo "Salt: $RANDOM" >> heartbeat.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          # Using --allow-empty as a safety net and pulling before pushing
          git commit -m "chore: automated heartbeat update [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main
